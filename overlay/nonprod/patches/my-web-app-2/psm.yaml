apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-web-app-my-webapp
  namespace: default
spec:
  template:
    spec:
      containers:
        - name: my-webapp
          resources:
            limits:
              cpu: 100m
              memory: 150Mi
            requests:
              cpu: 5pm
              memory: 100Mi