{{- if .Values.verticalAutoscaling.enabled }}
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: {{ include "my-webapp.fullname" . }}
  labels:
    {{- include "my-webapp.labels" . | nindent 4 }}
spec:
  targetRef:
    apiVersion: "apps/v1"
    kind: Deployment
    name: {{ include "my-webapp.fullname" . }}
  updatePolicy:
    updateMode: {{ .Values.verticalAutoscaling.updateMode | quote }}
  resourcePolicy:
    containerPolicies:
      - containerName: '*'
        minAllowed:
          cpu: {{ .Values.verticalAutoscaling.minAllowed.cpu }}
          memory: {{ .Values.verticalAutoscaling.minAllowed.memory }}
        maxAllowed:
          cpu: {{ .Values.verticalAutoscaling.maxAllowed.cpu }}
          memory: {{ .Values.verticalAutoscaling.maxAllowed.memory }}
{{- end }}