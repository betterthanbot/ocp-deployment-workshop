# Source: my-webapp/templates/rolebinding.yaml
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: release-name-my-webapp
  labels:
    helm.sh/chart: my-webapp-0.1.0
    app.kubernetes.io/name: my-webapp
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: Helm
subjects:
  - kind: ServiceAccount
    name: release-name-my-webapp
    namespace: my-demo-app
roleRef:
  kind: ClusterRole
  name: view # Change this to your specific role if needed
  apiGroup: rbac.authorization.k8s.io
---
# Source: my-webapp/templates/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: release-name-my-webapp
  labels:
    helm.sh/chart: my-webapp-0.1.0
    app.kubernetes.io/name: my-webapp
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: Helm
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: my-webapp
    app.kubernetes.io/instance: release-name
---
# Source: my-webapp/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: release-name-my-webapp
  labels:
    helm.sh/chart: my-webapp-0.1.0
    app.kubernetes.io/name: my-webapp
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: my-webapp
      app.kubernetes.io/instance: release-name
  template:
    metadata:
      labels:
        app.kubernetes.io/name: my-webapp
        app.kubernetes.io/instance: release-name
    spec:
      serviceAccountName: release-name-my-webapp
      containers:
        - name: my-webapp
          image: "nginx:latest"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          
          # --- CRITICAL UPDATE FOR HPA/VPA ---
          # This pulls the 'resources' block from your values.yaml.
          # Without requests/limits, HPA cannot calculate percentage utilization.
          resources:
            limits:
              cpu: 200m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 128Mi
          # -----------------------------------

          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          
          volumeMounts:
            - name: data
              mountPath: /usr/share/nginx/html

      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: release-name-my-webapp
---
# Source: my-webapp/templates/route.yaml
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: release-name-my-webapp
  labels:
    helm.sh/chart: my-webapp-0.1.0
    app.kubernetes.io/name: my-webapp
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: Helm
spec:
  host: my-webapp.example.com
  to:
    kind: Service
    name: release-name-my-webapp
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
